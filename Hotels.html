<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حجز الفنادق</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header>
        <h1>مرحبا بك في موقع حجز الفنادق</h1>
    </header>

    <section class="hotel-list">
        <h2>الفنادق المتاحة</h2>

        <div class="hotel" id="marriott">
            <img src="https://images.unsplash.com/photo-1607124010642-a7449ead2192?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Nnx8bWFycmlvdHQlMjBob3RlbHxlbnwwfHwwfHx8MA%3D%3D" 
                 alt="Marriott Hotel" class="hotel-img">
            <h3>Marriott</h3>
            <p>فندق ماريوت يقدم خدمات فاخرة في مواقع متنوعة.</p>
            <button onclick="bookHotel('Marriott')">احجز الآن</button>
        </div>

        <div class="hotel" id="hilton">
            <img src="https://images.unsplash.com/photo-1706878846553-6c0a181ae8c6?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8M3x8SGlsdG9uJTIwaG90ZWx8ZW58MHx8MHx8fDA%3D" 
                 alt="Hilton Hotel" class="hotel-img">
            <h3>Hilton</h3>
            <p>فندق هيلتون يقدم تجربة مريحة ومميزة للزوار.</p>
            <button onclick="bookHotel('Hilton')">احجز الآن</button>
        </div>

        <div class="hotel" id="intercontinental">
            <img src="https://images.unsplash.com/photo-1651937468991-7aa4a90dc6d1?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Mnx8aW50ZXJjb250aW5lbnRhbCUyMGhvdGVsfGVufDB8fDB8fHww" 
                 alt="InterContinental Hotel" class="hotel-img">
            <h3>InterContinental</h3>
            <p>فندق إنتركونتيننتال يقدم تجربة إقامة راقية حول العالم.</p>
            <button onclick="bookHotel('InterContinental')">احجز الآن</button>
        </div>

    </section>

    <script src="script.js"></script>
</body>
</html>
