<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuxuryStay</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header>
        <!-- زر لتبديل اللغة -->
        <button onclick="switchLanguage()">Switch to English</button>
        <!-- نص الترحيب مع التعديل في اللغة العربية -->
        <h1 id="title">احجز اقامتك واستمتع بها معنا في LuxuryStay حيث تجد الفخامة والرفاهية</h1>
    </header>

    <section class="hotel-list">
        <h2 id="available-hotels">الفنادق المتاحة</h2>

        <div class="hotel" id="marriott">
            <img src="https://images.unsplash.com/photo-1607124010642-a7449ead2192?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Nnx8bWFycmlvdHQlMjBob3RlbHxlbnwwfHwwfHx8MA%3D%3D" alt="Marriott Hotel" class="hotel-img">
            <h3 id="marriott-name">Marriott</h3>
            <p id="marriott-description">فندق ماريوت يقدم خدمات فاخرة في مواقع متنوعة.</p>
            <button onclick="bookHotel('Marriott')">احجز الآن</button>
        </div>

        <div class="hotel" id="hilton">
            <img src="https://images.unsplash.com/photo-1706878846553-6c0a181ae8c6?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8M3x8SGlsdG9uJTIwaG90ZWx8ZW58MHx8MHx8fDA%3D" alt="Hilton Hotel" class="hotel-img">
            <h3 id="hilton-name">Hilton</h3>
            <p id="hilton-description">فندق هيلتون يقدم تجربة مريحة ومميزة للزوار.</p>
            <button onclick="bookHotel('Hilton')">احجز الآن</button>
        </div>

        <div class="hotel" id="intercontinental">
            <img src="https://images.unsplash.com/photo-1651937468991-7aa4a90dc6d1?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Mnx8aW50ZXJjb250aW5lbnRhbCUyMGhvdGVsfGVufDB8fDB8fHww" alt="InterContinental Hotel" class="hotel-img">
            <h3 id="intercontinental-name">InterContinental</h3>
            <p id="intercontinental-description">فندق إنتركونتيننتال يقدم تجربة إقامة راقية حول العالم.</p>
            <button onclick="bookHotel('InterContinental')">احجز الآن</button>
        </div>

    </section>

    <script src="script.js"></script>

    <script>
        // دالة لتبديل النصوص بين اللغة العربية والإنجليزية
        function switchLanguage() {
            // التبديل بين النصوص العربية والإنجليزية
            if (document.documentElement.lang === "ar") {
                document.getElementById("title").innerText = "Book your stay and enjoy it with us at LuxuryStay, where luxury and comfort meet.";
                document.getElementById("available-hotels").innerText = "Available Hotels";
                document.getElementById("marriott-name").innerText = "Marriott";
                document.getElementById("marriott-description").innerText = "Marriott Hotel offers luxurious services in various locations.";
                document.getElementById("hilton-name").innerText = "Hilton";
                document.getElementById("hilton-description").innerText = "Hilton Hotel offers a comfortable and exceptional experience for guests.";
                document.getElementById("intercontinental-name").innerText = "InterContinental";
                document.getElementById("intercontinental-description").innerText = "InterContinental Hotels provide a refined stay worldwide.";
                document.querySelector("button").innerText = "Switch to Arabic";
                document.documentElement.lang = "en"; // تغيير اللغة إلى الإنجليزية
            } else {
                document.getElementById("title").innerText = "احجز اقامتك واستمتع بها معنا في LuxuryStay حيث تجد الفخامة والرفاهية";
                document.getElementById("available-hotels").innerText = "الفنادق المتاحة";
                document.getElementById("marriott-name").innerText = "Marriott";
                document.getElementById("marriott-description").innerText = "فندق ماريوت يقدم خدمات فاخرة في مواقع متنوعة.";
                document.getElementById("hilton-name").innerText = "Hilton";
                document.getElementById("hilton-description").innerText = "فندق هيلتون يقدم تجربة مريحة ومميزة للزوار.";
                document.getElementById("intercontinental-name").innerText = "InterContinental";
                document.getElementById("intercontinental-description").innerText = "فندق إنتركونتيننتال يقدم تجربة إقامة راقية حول العالم.";
                document.querySelector("button").innerText = "Switch to English";
                document.documentElement.lang = "ar"; // تغيير اللغة إلى العربية
            }
        }
    </script>

</body>
</html>
