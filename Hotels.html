<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حجز الفنادق</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>مرحبا بك في موقع حجز الفنادق</h1>
    </header>

    <section class="hotel-list">
        <h2>الفنادق المتاحة</h2>

        <div class="hotel" id="marriott">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSlIu6ZfYgLE0BX-o93eBOv628bfu1ooZYOOVx0tS2h0w&s=10" alt="Marriott Hotel" class="hotel-img">
            <h3>Marriott</h3>
            <p>فندق ماريوت يقدم خدمات فاخرة في مواقع متنوعة.</p>
            <button onclick="bookHotel('Marriott')">احجز الآن</button>
        </div>

        <div class="hotel" id="hilton">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRJKRk1gVLae_6-ldPm92MeBMUAcfKp9wBDEW6CsuZqXA&s=10" alt="Hilton Hotel" class="hotel-img">
            <h3>Hilton</h3>
            <p>فندق هيلتون يقدم تجربة مريحة ومميزة للزوار.</p>
            <button onclick="bookHotel('Hilton')">احجز الآن</button>
        </div>

        <div class="hotel" id="intercontinental">
            <img src="https://digital.ihg.com/is/image/ihg/intercontinental-jeddah-6189635494-2x1" alt="InterContinental Hotel" class="hotel-img">
            <h3>InterContinental</h3>
            <p>فندق إنتركونتيننتال يقدم تجربة إقامة راقية حول العالم.</p>
            <button onclick="bookHotel('InterContinental')">احجز الآن</button>
        </div>

    </section>

    <script src="script.js"></script>
</body>
</html>
