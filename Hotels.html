<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuxuryStay</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header>
        <!-- زر تغيير اللغة -->
        <button onclick="switchLanguage()">Switch to English</button>
        <h1 id="title">مرحبا بك في LuxuryStay</h1>
    </header>

    <section class="hotel-list">
        <h2 id="available-hotels">الفنادق المتاحة</h2>

        <div class="hotel" id="marriott">
            <img src="https://images.unsplash.com/photo-1607124010642-a7449ead2192?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Nnx8bWFycmlvdHQlMjBob3RlbHxlbnwwfHwwfHx8MA%3D%3D" alt="Marriott Hotel" class="hotel-img">
            <h3 id="marriott-name">Marriott</h3>
            <p id="marriott-description">فندق ماريوت يقدم خدمات فاخرة في مواقع متنوعة.</p>
            <button onclick="bookHotel('Marriott')">احجز الآن</button>
        </div>

        <div class="hotel" id="hilton">
            <img src="https://images.unsplash.com/photo-1706878846553-6c0a181ae8c6?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8M3x8SGlsdG9uJTIwaG90ZWx8ZW58MHx8MHx8fDA%3D" alt="Hilton Hotel" class="hotel-img">
            <h3 id="hilton-name">Hilton</h3>
            <p id="hilton-description">فندق هيلتون يقدم تجربة مريحة ومميزة للزوار.</p>
            <button onclick="bookHotel('Hilton')">احجز الآن</button>
        </div>

        <div class="hotel" id="intercontinental">
            <img src="https://images.unsplash.com/photo-1651937468991-7aa4a90dc6d1?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Mnx8aW50ZXJjb250aW5lbnRhbCUyMGhvdGVsfGVufDB8fDB8fHww" alt="InterContinental Hotel" class="hotel-img">
            <h3 id="intercontinental-name">InterContinental</h3>
            <p id="intercontinental-description">فندق إنتركونتيننتال يقدم تجربة إقامة راقية حول العالم.</p>
            <button onclick="bookHotel('InterContinental')">احجز الآن</button>
        </div>

    </section>

    <script src="script.js"></script>

    <script>
        const texts = {
            ar: {
                title: "مرحبا بك في LuxuryStay",
                availableHotels: "الفنادق المتاحة",
                marriottName: "Marriott",
                marriottDescription: "فندق ماريوت يقدم خدمات فاخرة في مواقع متنوعة.",
                hiltonName: "Hilton",
                hiltonDescription: "فندق هيلتون يقدم تجربة مريحة ومميزة للزوار.",
                intercontinentalName: "InterContinental",
                intercontinentalDescription: "فندق إنتركونتيننتال يقدم تجربة إقامة راقية حول العالم.",
                button: "Switch to English"
            },
            en: {
                title: "Welcome to LuxuryStay",
                availableHotels: "Available Hotels",
                marriottName: "Marriott",
                marriottDescription: "Marriott Hotel offers luxurious services in various locations.",
                hiltonName: "Hilton",
                hiltonDescription: "Hilton Hotel offers a comfortable and exceptional experience for guests.",
                intercontinentalName: "InterContinental",
                intercontinentalDescription: "InterContinental Hotels provide a refined stay worldwide.",
                button: "Switch to Arabic"
            }
        };

        let currentLang = 'ar'; // اللغة الافتراضية هي العربية

        // دالة لتبديل النصوص بين العربية والإنجليزية
        function switchLanguage() {
            currentLang = currentLang === 'ar' ? 'en' : 'ar'; // التبديل بين اللغتين
            document.documentElement.lang = currentLang; // تغيير اللغة في HTML

            // تحديث النصوص في الصفحة
            document.getElementById("title").innerText = texts[currentLang].title;
            document.getElementById("available-hotels").innerText = texts[currentLang].availableHotels;
            document.getElementById("marriott-name").innerText = texts[currentLang].marriottName;
            document.getElementById("marriott-description").innerText = texts[currentLang].marriottDescription;
            document.getElementById("hilton-name").innerText = texts[currentLang].hiltonName;
            document.getElementById("hilton-description").innerText = texts[currentLang].hiltonDescription;
            document.getElementById("intercontinental-name").innerText = texts[currentLang].intercontinentalName;
            document.getElementById("intercontinental-description").innerText = texts[currentLang].intercontinentalDescription;
            document.querySelector("button").innerText = texts[currentLang].button;
        }
    </script>

</body>
</html>
